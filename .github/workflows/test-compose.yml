name: Test Docker Compose

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and start services
        env:
          DOCKER_BUILDKIT: 1
        run: docker compose up -d --build
        
      - name: Run Health Checks with Retries
        run: |
          # Функция для ожидания доступности сервиса
          wait_for_service() {
            local name=$1
            local url=$2
            local auth_args=$3
            local max_retries=15
            local interval=4
            local counter=0
            
            echo "⏳ Waiting for $name ($url)..."
            
            while [ $counter -lt $max_retries ]; do
              # Выполняем curl и получаем только код ответа
              if [ -n "$auth_args" ]; then
                http_code=$(curl -s -o /dev/null -w "%{http_code}" $auth_args "$url" 2>/dev/null)
              else
                http_code=$(curl -s -o /dev/null -w "%{http_code}" "$url" 2>/dev/null)
              fi
              
              # Проверяем успешный код (2xx)
              if [[ "$http_code" =~ ^2 ]]; then
                echo "✅ $name is ready! (HTTP $http_code)"
                return 0
              fi
              
              counter=$((counter + 1))
              echo "   ⚠️ $name not ready yet (Attempt $counter/$max_retries, HTTP: $http_code). Retrying in ${interval}s..."
              sleep $interval
            done
            
            echo "❌ $name failed to start after $((max_retries * interval)) seconds."
            echo "--- Logs for $name ---"
            # Пытаемся вывести логи конкретного сервиса для отладки
            docker compose logs "$name" || echo "Could not fetch logs for $name"
            return 1
          }

          # 1. Проверка App Service
          if ! wait_for_service "App Service" "http://localhost:5000/health"; then
            exit 1
          fi

          # 2. Проверка Prometheus
          if ! wait_for_service "Prometheus" "http://localhost:9090/-/healthy"; then
            exit 1
          fi

          # 3. Проверка Grafana (с авторизацией)
          if ! wait_for_service "Grafana" "http://localhost:3000/api/health" "-u admin:workshop"; then
            exit 1
          fi
          
          # 4. Финальная проверка наличия кастомных метрик
          echo " Checking custom metrics endpoint..."
          metrics_output=$(curl -s http://localhost:5000/metrics)
          if echo "$metrics_output" | grep -q "fintech_requests_total"; then
            echo "✅ Custom metrics found."
          else
            echo "❌ Custom metrics check failed. 'fintech_requests_total' not found."
            echo "Last 20 lines of app logs:"
            docker compose logs --tail=20 app
            exit 1
          fi
          
          echo "🎉 All health checks passed successfully!"
          
      - name: Cleanup
        if: always()
        run: docker compose down -v