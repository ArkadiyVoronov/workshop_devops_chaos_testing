global:
  scrape_interval: 2s
  evaluation_interval: 2s

rule_files:
  - "/etc/prometheus/prometheus.rules.yml"

scrape_configs:
  - job_name: 'fintech-api'
    static_configs:
      - targets: ['app:5000']
    metrics_path: '/metrics'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
